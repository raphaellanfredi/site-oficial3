name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    # Runs on a self-hosted runner installed directly on the VPS.
    # Hostinger's network-edge anti-abuse protection was silently dropping
    # inbound SSH from GitHub-hosted runners (Azure IP ranges), even though
    # no rule existed in iptables/ufw or the hPanel firewall — connections
    # timed out before reaching sshd. Running the job on the VPS itself
    # removes the inbound-SSH dependency entirely: the runner polls GitHub
    # over an outbound HTTPS connection, so "deploy" becomes local
    # filesystem + docker commands instead of rsync/ssh over the network.
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: eva-next/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: eva-next

      - name: Build
        run: npm run build
        working-directory: eva-next

      - name: Copy site files
        run: |
          mkdir -p /var/www/eva/dist/public
          rsync -avz --delete eva-next/out/ /var/www/eva/dist/public/

      - name: Copy deploy config
        run: |
          mkdir -p /opt/stacks/eva
          rsync -avz deploy/ /opt/stacks/eva/

      - name: Deploy Docker stack
        run: |
          cd /opt/stacks/eva
          docker stack rm eva 2>/dev/null || true
          sleep 5
          docker config rm eva_nginx_spa_conf 2>/dev/null || true
          docker stack deploy -c eva_site.yaml eva

      # Independent stack: stores every onboarding submission directly on
      # the VPS (SQLite file under /opt/data/eva-onboarding), in parallel
      # with the n8n webhook call made from the browser. This removes the
      # single point of failure where a lost/unavailable webhook meant the
      # submission was gone for good.
      - name: Build onboarding-store image
        run: docker build -t eva-onboarding-store:latest onboarding-store

      - name: Copy onboarding-store deploy config
        run: |
          mkdir -p /opt/stacks/eva-onboarding-store
          rsync -avz deploy/onboarding_store.yaml /opt/stacks/eva-onboarding-store/

      - name: Deploy onboarding-store stack
        env:
          ONBOARDING_API_KEY: ${{ secrets.ONBOARDING_API_KEY }}
          ONBOARDING_ADMIN_USER: ${{ secrets.ONBOARDING_ADMIN_USER }}
          ONBOARDING_ADMIN_PASS: ${{ secrets.ONBOARDING_ADMIN_PASS }}
        run: |
          mkdir -p /opt/data/eva-onboarding
          cd /opt/stacks/eva-onboarding-store
          docker stack deploy -c onboarding_store.yaml eva-onboarding-store
          docker service update --force eva-onboarding-store_onboarding-store
