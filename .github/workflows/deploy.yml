name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: eva-next/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: eva-next

      - name: Build
        run: npm run build
        working-directory: eva-next

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Copy site files to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            eva-next/out/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/eva/dist/public/

      - name: Copy deploy config to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /opt/stacks/eva"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deploy/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/stacks/eva/

      - name: Deploy Docker stack
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
              cd /opt/stacks/eva
              docker stack rm eva 2>/dev/null || true
              sleep 5
              docker config rm eva_nginx_spa_conf 2>/dev/null || true
              docker stack deploy -c eva_site.yaml eva
            "
