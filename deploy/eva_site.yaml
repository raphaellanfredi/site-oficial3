version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    configs:
      - source: nginx_spa_conf
        target: /etc/nginx/conf.d/default.conf
    volumes:
      - /var/www/eva/dist/public:/usr/share/nginx/html:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

configs:
  nginx_spa_conf:
    file: ./nginx.conf
