version: "3.8"

services:
  nginx:
    image: nginx:alpine
    configs:
      - source: nginx_spa_conf
        target: /etc/nginx/conf.d/default.conf
    volumes:
      - /var/www/eva/dist/public:/usr/share/nginx/html:ro
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.eva.rule=Host(`www.evainteligencia.com.br`)"
        - "traefik.http.routers.eva.entrypoints=web"
        - "traefik.http.services.eva.loadbalancer.server.port=80"

configs:
  nginx_spa_conf:
    file: ./nginx.conf

networks:
  network_public:
    external: true
