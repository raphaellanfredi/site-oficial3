version: "3.8"

services:
  nginx:
    image: nginx:alpine
    volumes:
      - /var/www/eva/dist/public:/usr/share/nginx/html:ro
      - /opt/stacks/eva/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.eva.rule=Host(`www.evainteligencia.com.br`)"
        - "traefik.http.routers.eva.entrypoints=web"
        - "traefik.http.services.eva.loadbalancer.server.port=80"

networks:
  network_public:
    external: true
